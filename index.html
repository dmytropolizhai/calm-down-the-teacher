<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Calm Down the Teacher</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #1a120b;
        overflow: hidden;
        font-family: monospace;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
      #game {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #2b1d12;
        max-width: 100vw;
        max-height: 100vh;
        box-shadow: 0 0 0 2px #3E2723, 0 8px 40px rgba(0,0,0,0.6);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
